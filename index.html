<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>個人記帳工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== 登入畫面 ===== -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-logo">💰</div>
      <h1>個人記帳工具</h1>
      <p>連結您的 Google 試算表，輕鬆管理日常收支</p>
      <button id="login-btn" class="btn btn-google" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 0 24 24" width="20" aria-hidden="true">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#fff"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#fff"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#fff"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#fff"/>
        </svg>
        <span id="login-btn-text">載入中...</span>
      </button>
    </div>
  </div>

  <!-- ===== 主要應用畫面 ===== -->
  <div id="app-screen" class="hidden">

    <header>
      <div class="header-brand">
        <span class="header-icon">💰</span>
        <span class="header-title">個人記帳工具</span>
      </div>
      <div class="user-info">
        <span id="user-name"></span>
        <button id="logout-btn" class="btn btn-outline-white">登出</button>
      </div>
    </header>

    <nav class="tabs" role="tablist">
      <button class="tab-btn active" data-tab="add" role="tab" aria-selected="true">＋ 新增記帳</button>
      <button class="tab-btn" data-tab="history" role="tab" aria-selected="false">帳務紀錄</button>
      <button class="tab-btn" data-tab="analysis" role="tab" aria-selected="false">分類分析</button>
      <button class="tab-btn" data-tab="monthly" role="tab" aria-selected="false">每月報表</button>
    </nav>

    <main class="app-main">

      <!-- 新增記帳 -->
      <section id="tab-add" class="tab-content active" role="tabpanel">
        <div class="card">
          <h2 class="card-title">新增記帳</h2>
          <form id="add-form" autocomplete="off" novalidate>
            <div class="form-row">
              <div class="form-group">
                <label for="input-date">日期</label>
                <input type="date" id="input-date" required>
              </div>
              <div class="form-group">
                <label for="input-type">類型</label>
                <select id="input-type" required>
                  <option value="">請選擇類型</option>
                  <option value="收入">收入</option>
                  <option value="支出">支出</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="input-category">分類</label>
                <select id="input-category" required>
                  <option value="">請先載入選項</option>
                </select>
              </div>
              <div class="form-group">
                <label for="input-amount">金額（NT$）</label>
                <input type="number" id="input-amount" min="1" step="1" placeholder="請輸入金額" required>
              </div>
            </div>
            <div class="form-group">
              <label for="input-description">描述</label>
              <input type="text" id="input-description" placeholder="請輸入描述（選填）" maxlength="200">
            </div>
            <div class="form-group">
              <label for="input-payment">付款方式</label>
              <select id="input-payment" required>
                <option value="">請選擇付款方式</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary" id="submit-btn">新增記帳</button>
          </form>
          <div id="form-message" class="form-message" role="alert" aria-live="polite"></div>
        </div>
      </section>

      <!-- 帳務紀錄 -->
      <section id="tab-history" class="tab-content" role="tabpanel">
        <div class="card">
          <div class="section-header">
            <h2 class="card-title">帳務紀錄</h2>
            <div class="filter-row">
              <select id="filter-month" aria-label="篩選月份">
                <option value="">全部月份</option>
              </select>
              <select id="filter-type" aria-label="篩選類型">
                <option value="">全部類型</option>
                <option value="收入">收入</option>
                <option value="支出">支出</option>
              </select>
            </div>
          </div>
          <div id="records-container">
            <div class="state-message">登入後即可查看帳務紀錄</div>
          </div>
        </div>
      </section>

      <!-- 分類分析 -->
      <section id="tab-analysis" class="tab-content" role="tabpanel">
        <div class="card">
          <div class="section-header">
            <h2 class="card-title">分類分析</h2>
            <div class="filter-row">
              <select id="analysis-month" aria-label="分析月份">
                <option value="">全部月份</option>
              </select>
              <select id="analysis-type" aria-label="分析類型">
                <option value="支出" selected>支出</option>
                <option value="收入">收入</option>
              </select>
            </div>
          </div>
          <div class="analysis-layout">
            <div class="chart-box">
              <canvas id="pie-chart" aria-label="分類圓餅圖"></canvas>
            </div>
            <div id="category-breakdown" class="category-breakdown">
              <div class="state-message">登入後即可查看分析</div>
            </div>
          </div>
        </div>
      </section>

      <!-- 每月報表 -->
      <section id="tab-monthly" class="tab-content" role="tabpanel">
        <div class="card">
          <h2 class="card-title">每月收支報表</h2>
          <div class="chart-box monthly-chart-box">
            <canvas id="monthly-chart" aria-label="每月收支長條圖"></canvas>
          </div>
          <div id="monthly-table-container"></div>
        </div>
      </section>

    </main>
  </div>

  <!-- Toast 通知 -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- 外部函式庫：Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

  <!-- 本地腳本（依序載入） -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>

  <!-- Google API（最後載入，onload 指向 auth.js 中已定義的函數） -->
  <script src="https://apis.google.com/js/api.js"
          onload="gapiLoaded()"
          onerror="onApiLoadError('Google API')"></script>
  <script src="https://accounts.google.com/gsi/client"
          onload="gsiLoaded()"
          onerror="onApiLoadError('Google 登入服務')"></script>

</body>
</html>
